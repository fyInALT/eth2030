participants:
  - el_type: geth
    el_image: eth2030:local
    el_extra_params: ["--rpc.rate_limit=0"]
    cl_type: lighthouse
    cl_image: sigp/lighthouse:latest
    count: 2

network_params:
  network: kurtosis
  seconds_per_slot: 2
  genesis_delay: 10

additional_services:
  - dora
  - spamoor
  - rakoon
  - assertoor

assertoor_params:
  run_stability_check: true

spamoor_params:
  spammers:
    - scenario: eoatx
      name: "EOA Transfers"
      config:
        throughput: 20
        max_pending: 50
        max_wallets: 30
        random_target: true
        tip_fee: 2
    - scenario: erc20tx
      name: "ERC20 Token Transfers"
      config:
        throughput: 10
        max_pending: 30
        max_wallets: 20
        random_target: true
        tip_fee: 2
    - scenario: erc721tx
      name: "ERC721 NFT Transfers"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2
    - scenario: deploytx
      name: "Contract Deployments"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2
    - scenario: setcodetx
      name: "EIP-7702 SetCode"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 20
        max_authorizations: 5
        random_code_addr: true
        random_target: true
        tip_fee: 2
    - scenario: blobs
      name: "EIP-4844 Blob Transactions"
      config:
        throughput: 3
        max_pending: 10
        max_wallets: 10
        sidecars: 2
        tip_fee: 2
    - scenario: gasburnertx
      name: "Gas Burner"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2
    - scenario: storagespam
      name: "Storage Spam"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2

rakoon_params:
  tx_type: eip7702
  workers: 10
  fuzzing: true
