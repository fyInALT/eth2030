participants:
  - el_type: geth
    el_image: eth2030:local
    el_log_level: debug
    el_extra_params: ["--rpc.rate_limit=0"]
    cl_type: lighthouse
    cl_image: sigp/lighthouse:latest
    # --subscribe-all-subnets ensures all nodes stay subscribed to all gossip topics.
    # count: 3 forms a triangle gossip mesh — if any pair temporarily disconnects
    # at the Fulu sync_committee deadline (slot 40 = epoch 1 slot 8), the third
    # node provides an alternative path for attestation propagation, enabling
    # reliable reconnection and finalization.
    cl_extra_params: ["--subscribe-all-subnets"]
    count: 3

network_params:
  network: kurtosis
  seconds_per_slot: 2
  genesis_delay: 60
  # fulu_fork_epoch: 1 pushes the first Fulu sync_committee deadline to slot 40,
  # giving nodes 40 slots (80s) to accumulate peer score before the brief gossip
  # disruption. With count: 3, nodes can reconnect via the third peer.
  # Note: Lighthouse warns about non-256-aligned fork epochs — this is acceptable
  # for a devnet where stability is more important than period alignment.
  fulu_fork_epoch: 1

additional_services:
  - dora
  - spamoor
  - rakoon
  - assertoor

assertoor_params:
  run_stability_check: true

spamoor_params:
  # Resource management for spamoor
  # CPU is milicores
  # RAM is in MB
  min_cpu: 10
  max_cpu: 1000
  min_mem: 20
  max_mem: 300
  spammers:
    - scenario: eoatx
      name: "EOA Transfers"
      config:
        throughput: 20
        max_pending: 50
        max_wallets: 30
        random_target: true
        tip_fee: 2
    - scenario: erc20tx
      name: "ERC20 Token Transfers"
      config:
        throughput: 10
        max_pending: 30
        max_wallets: 20
        random_target: true
        tip_fee: 2
    - scenario: erc721tx
      name: "ERC721 NFT Transfers"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2
    - scenario: erc1155tx
      name: "ERC1155 Multi-Token"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2
    - scenario: setcodetx
      name: "EIP-7702 SetCode"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 20
        # Use min = max for deterministic auth count (reference pattern).
        min_authorizations: 5
        max_authorizations: 5
        # max_delegators caps unique delegator accounts to limit state growth.
        # Without it every tx creates fresh delegators (unbounded state bloat).
        max_delegators: 100
        # Gas formula: 21000 + 5*(12500+25000) = 208500 (all empty delegators).
        # Use 300000 for headroom.
        gas_limit: 300000
        random_code_addr: true
        random_target: true
        tip_fee: 2
    - scenario: blobs
      name: "EIP-4844 Blob Transactions"
      config:
        throughput: 3
        max_pending: 10
        max_wallets: 10
        sidecars: 2
        tip_fee: 2
    - scenario: gasburnertx
      name: "Gas Burner"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2
        # Use 2M gas per tx (scenario default) to keep wallet funding affordable.
        gas_units_to_burn: 2000000
    - scenario: storagespam
      name: "Storage Spam"
      config:
        throughput: 5
        max_pending: 20
        max_wallets: 15
        tip_fee: 2
        gas_units_to_burn: 2000000

rakoon_params:
  tx_type: eip7702
  workers: 10
  fuzzing: true
