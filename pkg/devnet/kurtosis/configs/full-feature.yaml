participants:
  - el_type: geth
    el_image: eth2030:local
    el_log_level: debug
    el_extra_params: ["--rpc.rate_limit=0"]
    cl_type: lighthouse
    cl_log_level: debug
    cl_image: eth2030cl:local
    # --subscribe-all-subnets ensures all nodes stay subscribed to all gossip topics.
    # --target-peers=2 prevents Lighthouse from dropping peers when it can't find
    # enough DataColumn subnet peers (default target is 50, impossible with 3 nodes).
    # --disable-peer-scoring prevents gossip scoring from penalizing peers that
    # can't serve all 128 data columns, which causes peer drops in small devnets.
    cl_extra_params: ["--subscribe-all-subnets", "--target-peers=2", "--disable-peer-scoring"]
    count: 3

network_params:
  network: kurtosis
  seconds_per_slot: 15
  genesis_delay: 60
  # Fork schedule:
  # - fulu_fork_epoch: 1 → Fulu (PeerDAS) starts at epoch 1 (slot 32)
  # - gloas_fork_epoch: 2 → Gloas (ePBS/EIP-7732) starts at epoch 2 (slot 64)
  # - heze_fork_epoch: 3 → Heze (FOCIL/EIP-7805) starts at epoch 3 (slot 96)
  # Note: Lighthouse warns about non-256-aligned fork epochs — this is acceptable
  # for a devnet where stability is more important than period alignment.
  fulu_fork_epoch: 1
  gloas_fork_epoch: 2
  heze_fork_epoch: 3

additional_services:
  - dora
  - spamoor
  - rakoon
  - assertoor
  - blockscout

dora_params:
  image: "eth2030/dora:v0.0.1"

assertoor_params:
  run_stability_check: true

spamoor_params:
  image: eth2030/spamoor:v0.0.1
  # Resource management for spamoor
  # CPU is milicores
  # RAM is in MB
  min_cpu: 5
  max_cpu: 30
  min_mem: 20
  max_mem: 300
  spammers:
    - scenario: eoatx
      name: "EOA Transfers"
      config:
        throughput: 6
        max_pending: 12
        max_wallets: 12
        random_target: true
        tip_fee: 2
    - scenario: erc20tx
      name: "ERC20 Token Transfers"
      config:
        throughput: 4
        max_pending: 10
        max_wallets: 10
        random_target: true
        tip_fee: 2
    - scenario: erc721tx
      name: "ERC721 NFT Transfers"
      config:
        throughput: 2
        max_pending: 6
        max_wallets: 6
        tip_fee: 2
    - scenario: erc1155tx
      name: "ERC1155 Multi-Token"
      config:
        throughput: 2
        max_pending: 6
        max_wallets: 6
        tip_fee: 2
    - scenario: setcodetx
      name: "EIP-7702 SetCode"
      config:
        throughput: 2
        max_pending: 6
        max_wallets: 8
        # Use min = max for deterministic auth count (reference pattern).
        min_authorizations: 5
        max_authorizations: 5
        # max_delegators caps unique delegator accounts to limit state growth.
        # Without it every tx creates fresh delegators (unbounded state bloat).
        max_delegators: 100
        # Gas formula: 21000 + 5*(12500+25000) = 208500 (all empty delegators).
        # Use 300000 for headroom.
        gas_limit: 300000
        random_code_addr: true
        random_target: true
        tip_fee: 2
    - scenario: aatx
      name: "EIP-7701 Native AA Raw"
      config:
        submit_mode: raw_tx
        throughput: 1
        max_pending: 4
        max_wallets: 6
        sender_validation_gas: 50000
        sender_execution_gas: 21000
        sender_execution_data: "0x"
        tip_fee: 2
    - scenario: aatx
      name: "EIP-7701 Native AA UserOp"
      config:
        submit_mode: user_operation
        throughput: 1
        max_pending: 4
        max_wallets: 6
        sender_validation_gas: 50000
        sender_execution_gas: 21000
        sender_execution_data: "0x"
        tip_fee: 2
    - scenario: blobs
      name: "EIP-4844 Blob Transactions"
      config:
        throughput: 1
        max_pending: 3
        max_wallets: 4
        sidecars: 1
        tip_fee: 2
    - scenario: gasburnertx
      name: "Gas Burner"
      config:
        throughput: 1
        max_pending: 3
        max_wallets: 4
        tip_fee: 2
        # Use 2M gas per tx (scenario default) to keep wallet funding affordable.
        gas_units_to_burn: 500000
    - scenario: storagespam
      name: "Storage Spam"
      config:
        throughput: 1
        max_pending: 3
        max_wallets: 4
        tip_fee: 2
        gas_units_to_burn: 500000

rakoon_params:
  tx_type: eip7702
  workers: 10
  fuzzing: true
