participants:
  - el_type: geth
    el_image: eth2030:local
    el_log_level: debug
    cl_type: lighthouse
    cl_image: sigp/lighthouse:latest
    cl_extra_params: ["--subscribe-all-subnets"]
    count: 3

network_params:
  network: kurtosis
  seconds_per_slot: 2
  genesis_delay: 60
  fulu_fork_epoch: 1

additional_services:
  - dora
  - spamoor
  - assertoor

spamoor_params:
  spammers:
    - scenario: eoatx
      name: "EOA Spam"
      config:
        throughput: 50
        max_pending: 100
        max_wallets: 50

assertoor_params:
  run_stability_check: true
