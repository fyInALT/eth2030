participants:
  - el_type: geth
    el_image: eth2030:local
    el_log_level: debug
    cl_type: lighthouse
    cl_image: sigp/lighthouse:latest
    cl_extra_params: ["--subscribe-all-subnets"]
    count: 2

network_params:
  network: kurtosis
  seconds_per_slot: 2
  genesis_delay: 60
  fulu_fork_epoch: 1

additional_services:
  - dora
  - spamoor
  - assertoor

spamoor_params:
  spammers:
    - scenario: blob-combined
      name: "Blob Stress"
      config:
        throughput: 30
        max_pending: 60
        max_wallets: 30
        sidecars_per_tx: 2

assertoor_params:
  run_stability_check: true
